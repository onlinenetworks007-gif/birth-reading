<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Cosmic Personality Reading</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="stars"></div>

<div class="container">

<h1>🔮 Cosmic Personality Reading</h1>

<p style="text-align:center;">
Enter your birth details to receive an inspirational cosmic reading.
</p>

<input
id="name"
placeholder="Your Name (Optional)"
>

<label>Date of Birth</label>

<input
type="date"
id="dob"
>

<label>Time of Birth</label>

<input
type="time"
id="time"
>

<label>Place of Birth</label>

<input
id="place"
placeholder="City / Place of Birth"
>

<button onclick="getReading()">
✨ Get My Reading
</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
